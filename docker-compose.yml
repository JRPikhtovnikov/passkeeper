services:
  postgres:
    image: postgres:16-alpine
    container_name: passkeeper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PASSKEEPER_DB_NAME:-passkeeper}
      POSTGRES_USER: ${PASSKEEPER_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${PASSKEEPER_DB_PASSWORD:?Set PASSKEEPER_DB_PASSWORD in .env}
    ports:
      - "${PASSKEEPER_DB_HOST_PORT:-5432}:5432"
    volumes:
      - passkeeper_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  passkeeper_postgres_data:
